<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vocal Salvos por Cristo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #FCDA78;
      --gold-dark: #DEB43A;
      --orange: #EC8441;
      --red: #ED4B4B;
      --white: #FFF;
      --placeholder: #D8D8D8;
      --text-white: rgba(255,255,255,1);
    }

    body {
      font-family: Roboto, -apple-system, Helvetica, sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app-shell {
      width: 430px;
      height: 932px;
      position: relative;
      overflow: hidden;
      background: #FFFAFA;
    }

    /* ---- PAGES ---- */
    .page {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }
    .page.active { display: block; }

    /* ---- SHARED: full-bleed bg image ---- */
    .page-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    /* ---- SHARED: back button ---- */
    .back-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--white);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: absolute;
      left: 20px;
      top: 7px;
      z-index: 10;
    }
    .back-btn svg { flex-shrink: 0; }

    /* ---- SHARED: ajuda link ---- */
    .ajuda-link {
      font-family: PoetsenOne, Roboto, sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--red);
      text-align: center;
      text-shadow: 0 4px 4px rgba(0,0,0,0.25);
      -webkit-text-stroke: 1px #000;
      cursor: pointer;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ---- SHARED: page title ---- */
    .page-title {
      font-family: Montserrat, sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ---- SHARED: field group ---- */
    .field-group {
      position: absolute;
      width: 376px;
    }
    .field-label {
      font-family: Roboto, sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 6px;
      display: block;
    }
    .field-input-wrap {
      width: 100%;
      height: 71px;
      border-radius: 9px;
      border: 2px solid var(--gold);
      background: rgba(217,217,217,0);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }
    .field-input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: Roboto, sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      min-width: 0;
    }
    .field-input-wrap input::placeholder { color: var(--placeholder); }
    .field-input-wrap .field-icon { flex-shrink: 0; }
    .field-input-wrap select {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: Roboto, sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--placeholder);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      min-width: 0;
    }
    .field-input-wrap select option { color: #333; background: #fff; }

    /* ---- SHARED: next arrow button ---- */
    .next-arrow-btn {
      width: 81px;
      height: 48px;
      cursor: pointer;
      display: block;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 4px 4px #000);
    }

    /* ===================== */
    /*  PAGE 1 — LOGIN       */
    /* ===================== */
    #page-login .login-email-field {
      width: 381px;
      height: 73px;
      border-radius: 9px;
      border: 2px solid var(--gold);
      background: transparent;
      display: flex;
      align-items: center;
      padding: 0 14px;
      position: absolute;
      left: 25px;
      top: 439px;
    }
    #page-login .login-email-field input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: Roboto, sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--white);
    }
    #page-login .login-email-field input::placeholder { color: var(--white); font-weight: 600; }

    #page-login .login-password-field {
      width: 381px;
      height: 73px;
      border-radius: 9px;
      border: 2px solid var(--gold);
      background: transparent;
      display: flex;
      align-items: center;
      padding: 0 15px;
      position: absolute;
      left: 24px;
      top: 528px;
    }
    #page-login .login-password-field input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: Roboto, sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--white);
    }
    #page-login .login-password-field input::placeholder { color: var(--white); font-weight: 600; }

    .login-enter-btn {
      width: 381px;
      height: 71px;
      border-radius: 35px;
      background: linear-gradient(0deg, var(--gold), var(--gold));
      border: none;
      cursor: pointer;
      position: absolute;
      left: 32px;
      top: 671px;
      font-family: Poppins, sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.5px;
    }
    .login-enter-btn:hover { filter: brightness(1.05); }

    .login-register-btn {
      width: 381px;
      height: 61px;
      border-radius: 35px;
      border: 2px solid var(--gold);
      background: var(--white);
      box-shadow: 0 4px 4px rgba(0,0,0,0.25);
      cursor: pointer;
      position: absolute;
      left: 33px;
      top: 758px;
      font-family: Roboto, sans-serif;
      font-size: 21px;
      font-weight: 700;
      color: var(--gold-dark);
    }
    .login-register-btn:hover { background: #fafafa; }

    #page-login .ajuda-link { top: 879px; }

    /* ===================== */
    /*  PAGE 2 — REGISTER 1 */
    /* ===================== */
    #page-reg1 .page-title { top: 53px; }
    #page-reg1 .ajuda-link { top: 886px; }

    .reg-next-img { top: 705px; }

    /* ===================== */
    /*  PAGE 3 — REGISTER 2 */
    /* ===================== */
    #page-reg2 .page-title { top: 53px; }
    #page-reg2 .ajuda-link { top: 886px; }

    /* ===================== */
    /*  PAGE 4 — REGISTER 3 */
    /* ===================== */
    #page-reg3 .page-title { top: 53px; }
    #page-reg3 .ajuda-link { top: 886px; }

    .avatar-upload-wrap {
      width: 171px;
      height: 162px;
      position: absolute;
      left: 128px;
      top: 490px;
    }
    .avatar-upload-box {
      width: 171px;
      height: 162px;
      border-radius: 61px;
      border: 3px solid var(--orange);
      background: var(--white);
      box-shadow: 0 4px 4px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
    }
    .avatar-upload-box img { width: 89px; height: 89px; object-fit: contain; }
    .avatar-edit-badge {
      width: 46px;
      height: 44px;
      border-radius: 50%;
      background: var(--orange);
      position: absolute;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .avatar-edit-badge img { width: 23px; height: 22px; }

    .finalizar-btn {
      width: 381px;
      height: 61px;
      border-radius: 35px;
      border: 2px solid var(--gold);
      background: var(--white);
      box-shadow: 0 4px 4px rgba(0,0,0,0.25);
      cursor: pointer;
      position: absolute;
      left: 27px;
      top: 683px;
      font-family: Roboto, sans-serif;
      font-size: 21px;
      font-weight: 700;
      color: var(--gold-dark);
    }
    .finalizar-btn:hover { background: #fafafa; }

    /* ===================== */
    /*  PAGE 5 — HOME        */
    /* ===================== */
    #page-home {
      background: var(--white);
    }

    .home-header {
      width: 100%;
      height: 63px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .home-back-btn {
      position: absolute;
      left: 16px;
      top: 22px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .home-logo {
      position: absolute;
      right: 16px;
      top: 8px;
      width: 55px;
      height: 49px;
      object-fit: contain;
    }

    .home-title {
      font-family: PoetsenOne, Roboto, sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--red);
      text-shadow: 0 4px 4px rgba(0,0,0,0.25);
      -webkit-text-stroke: 1px #000;
    }

    .home-search-bar {
      width: 401px;
      height: 39px;
      border-radius: 9px;
      border: 2px solid var(--gold);
      background: var(--white);
      box-shadow: 0 4px 4px rgba(0,0,0,0.2);
      position: absolute;
      left: 16px;
      top: 63px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
    }
    .home-search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-family: Roboto, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #A8A8A8;
      background: transparent;
    }
    .home-search-bar input::placeholder { color: #A8A8A8; }

    .home-fab {
      width: 86px;
      height: 77px;
      border-radius: 190px;
      background: var(--gold);
      position: absolute;
      right: 16px;
      top: 119px;
      cursor: pointer;
      border: none;
    }

    .home-bottom-nav {
      width: 100%;
      height: 51px;
      background: var(--white);
      position: absolute;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 10px;
      border-top: 1px solid #f0f0f0;
    }
    .nav-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    /* ===================== */
    /*   RESPONSIVE          */
    /* ===================== */
    @media (max-width: 430px) {
      .app-shell {
        width: 100vw;
        height: 100dvh;
        min-height: 100vh;
      }
      .home-search-bar { width: calc(100% - 32px); }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ======================== PAGE 1: LOGIN ======================== -->
  <div id="page-login" class="page active">
    <img class="page-bg" src="https://api.builder.io/api/v1/image/assets/TEMP/96d42ee776b81abe2282a5b01a6b075656305a94?width=860" alt="" />

    <!-- Email field -->
    <div class="login-email-field">
      <input type="email" placeholder="Email ou número de telefone" autocomplete="email" />
    </div>

    <!-- Password field -->
    <div class="login-password-field">
      <input type="password" placeholder="Senha" autocomplete="current-password" />
    </div>

    <!-- ENTRAR button -->
    <button class="login-enter-btn" onclick="showPage('page-home')">ENTRAR</button>

    <!-- CADASTRAR button -->
    <button class="login-register-btn" onclick="showPage('page-reg1')">CADASTRAR</button>

    <!-- AJUDA -->
    <span class="ajuda-link">AJUDA</span>
  </div>

  <!-- ======================== PAGE 2: REGISTER STEP 1 ======================== -->
  <div id="page-reg1" class="page">
    <img class="page-bg" src="https://api.builder.io/api/v1/image/assets/TEMP/2207cc5a954b943e3fe858aa749f287a40fb714f?width=860" alt="" />

    <!-- Back -->
    <button class="back-btn" onclick="showPage('page-login')" aria-label="Voltar">
      <svg width="28" height="29" viewBox="0 0 28 29" fill="none"><path d="M9.129 15.7083L15.6623 22.475L13.9998 24.1667L4.6665 14.5L13.9998 4.83333L15.6623 6.525L9.129 13.2917H23.3332V15.7083H9.129Z" fill="#FCDA78"/></svg>
    </button>

    <!-- Title -->
    <span class="page-title" style="top:53px">Crie sua conta</span>

    <!-- Nome -->
    <div class="field-group" style="left:27px;top:121px">
      <label class="field-label">Nome</label>
      <div class="field-input-wrap">
        <input type="text" placeholder="Seu nome" autocomplete="name" />
        <svg class="field-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12ZM12 14C8.13401 14 5 17.134 5 21H19C19 17.134 15.866 14 12 14Z" fill="#EC8441"/></svg>
      </div>
    </div>

    <!-- Telefone -->
    <div class="field-group" style="left:27px;top:238px">
      <label class="field-label">Telefone</label>
      <div class="field-input-wrap">
        <input type="tel" placeholder="(99) 99999-9999" autocomplete="tel" />
        <svg class="field-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6.62 10.79C8.06 13.62 10.38 15.93 13.21 17.38L15.41 15.18C15.68 14.91 16.08 14.82 16.43 14.94C17.55 15.31 18.76 15.51 20 15.51C20.55 15.51 21 15.96 21 16.51V20C21 20.55 20.55 21 20 21C10.61 21 3 13.39 3 4C3 3.45 3.45 3 4 3H7.5C8.05 3 8.5 3.45 8.5 4C8.5 5.25 8.7 6.45 9.07 7.57C9.18 7.92 9.1 8.31 8.82 8.59L6.62 10.79Z" fill="#EC8441"/></svg>
      </div>
    </div>

    <!-- E-mail -->
    <div class="field-group" style="left:27px;top:355px">
      <label class="field-label">E-mail</label>
      <div class="field-input-wrap">
        <input type="email" placeholder="voce@email.com" autocomplete="email" />
        <svg class="field-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z" fill="#EC8441"/></svg>
      </div>
    </div>

    <!-- Senha -->
    <div class="field-group" style="left:27px;top:472px">
      <label class="field-label">Senha <span style="color:var(--gold)">*</span></label>
      <div class="field-input-wrap">
        <input type="password" placeholder="Mín. 6 caracteres" autocomplete="new-password" />
        <svg class="field-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM12 17C10.9 17 10 16.1 10 15C10 13.9 10.9 13 12 13C13.1 13 14 13.9 14 15C14 16.1 13.1 17 12 17ZM15.1 8H8.9V6C8.9 4.29 10.29 2.9 12 2.9C13.71 2.9 15.1 4.29 15.1 6V8Z" fill="#EC8441"/></svg>
      </div>
    </div>

    <!-- Confirmar senha -->
    <div class="field-group" style="left:27px;top:589px">
      <label class="field-label">Confirmar senha</label>
      <div class="field-input-wrap">
        <input type="password" placeholder="Repita a senha" autocomplete="new-password" />
        <svg class="field-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 13.34 13.66 9 12 9Z" fill="#EC8441"/></svg>
      </div>
    </div>

    <!-- Next arrow -->
    <img class="next-arrow-btn reg-next-img" src="https://api.builder.io/api/v1/image/assets/TEMP/040bcd501833c6fa15cc84ffa15aa8623c50c360?width=162" alt="Próximo" onclick="showPage('page-reg2')" style="cursor:pointer" />

    <!-- AJUDA -->
    <span class="ajuda-link" style="top:886px">AJUDA</span>
  </div>

  <!-- ======================== PAGE 3: REGISTER STEP 2 ======================== -->
  <div id="page-reg2" class="page">
    <img class="page-bg" src="https://api.builder.io/api/v1/image/assets/TEMP/2207cc5a954b943e3fe858aa749f287a40fb714f?width=860" alt="" />

    <!-- Back -->
    <button class="back-btn" onclick="showPage('page-reg1')" aria-label="Voltar">
      <svg width="28" height="29" viewBox="0 0 28 29" fill="none"><path d="M9.129 15.7083L15.6623 22.475L13.9998 24.1667L4.6665 14.5L13.9998 4.83333L15.6623 6.525L9.129 13.2917H23.3332V15.7083H9.129Z" fill="#FCDA78"/></svg>
    </button>

    <!-- Title -->
    <span class="page-title" style="top:53px">Crie sua conta</span>

    <!-- CEP -->
    <div class="field-group" style="left:27px;top:121px">
      <label class="field-label">CEP</label>
      <div class="field-input-wrap">
        <input type="text" placeholder="CEP" maxlength="9" />
      </div>
    </div>

    <!-- Bairro -->
    <div class="field-group" style="left:27px;top:238px">
      <label class="field-label">Bairro</label>
      <div class="field-input-wrap">
        <input type="text" placeholder="Bairro" />
      </div>
    </div>

    <!-- Cidade -->
    <div class="field-group" style="left:27px;top:355px">
      <label class="field-label">Cidade</label>
      <div class="field-input-wrap">
        <input type="text" placeholder="Cidade" />
      </div>
    </div>

    <!-- Rua -->
    <div class="field-group" style="left:27px;top:472px">
      <label class="field-label">Rua</label>
      <div class="field-input-wrap">
        <input type="text" placeholder="Rua" />
      </div>
    </div>

    <!-- Número da casa -->
    <div class="field-group" style="left:27px;top:589px">
      <label class="field-label">Número da casa</label>
      <div class="field-input-wrap">
        <input type="text" placeholder="Número da Casa" />
      </div>
    </div>

    <!-- Next arrow -->
    <img class="next-arrow-btn reg-next-img" src="https://api.builder.io/api/v1/image/assets/TEMP/908b2b95bb7dfa4194061a50d2ce4cf6281d35d7?width=162" alt="Próximo" onclick="showPage('page-reg3')" style="cursor:pointer" />

    <!-- AJUDA -->
    <span class="ajuda-link" style="top:886px">AJUDA</span>
  </div>

  <!-- ======================== PAGE 4: REGISTER STEP 3 ======================== -->
  <div id="page-reg3" class="page">
    <img class="page-bg" src="https://api.builder.io/api/v1/image/assets/TEMP/2207cc5a954b943e3fe858aa749f287a40fb714f?width=860" alt="" />

    <!-- Back -->
    <button class="back-btn" onclick="showPage('page-reg2')" aria-label="Voltar">
      <svg width="28" height="29" viewBox="0 0 28 29" fill="none"><path d="M9.129 15.7083L15.6623 22.475L13.9998 24.1667L4.6665 14.5L13.9998 4.83333L15.6623 6.525L9.129 13.2917H23.3332V15.7083H9.129Z" fill="#FCDA78"/></svg>
    </button>

    <!-- Title -->
    <span class="page-title" style="top:53px">Crie sua conta</span>

    <!-- Estado Cívil -->
    <div class="field-group" style="left:27px;top:121px">
      <label class="field-label">Estado Cívil</label>
      <div class="field-input-wrap">
        <select>
          <option value="" disabled selected>SLIDE</option>
          <option value="solteiro">Solteiro(a)</option>
          <option value="casado">Casado(a)</option>
          <option value="divorciado">Divorciado(a)</option>
          <option value="viuvo">Viúvo(a)</option>
        </select>
        <svg class="field-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8L10 13L15 8" stroke="#D8D8D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- Gênero -->
    <div class="field-group" style="left:27px;top:238px">
      <label class="field-label">Gênero</label>
      <div class="field-input-wrap">
        <select>
          <option value="" disabled selected>SLIDE</option>
          <option value="masculino">Masculino</option>
          <option value="feminino">Feminino</option>
          <option value="outro">Outro</option>
        </select>
        <svg class="field-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 8L10 13L15 8" stroke="#D8D8D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <!-- Timbre Vocal -->
    <div class="field-group" style="left:27px;top:355px">
      <label class="field-label">Timbre Vocal <span style="color:var(--gold)">*</span></label>
      <div class="field-input-wrap">
        <select>
          <option value="" disabled selected>TIMBRE</option>
          <option value="soprano">Soprano</option>
          <option value="mezzo">Mezzo-soprano</option>

<script>
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function previewAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('avatar-preview').src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
</script>
